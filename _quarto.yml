project:
  type: website
  output-dir: _site
  # Only the converted cookbook is rendered. The original *.Rmd sources and the
  # repo's *.md docs are excluded until they are removed in the final step.
  render:
    - index.qmd
    - tasks/
    - data/README.md

website:
  title: "Betsy's Stats Cookbook"
  description: "A cookbook of applied-statistics code snippets, organized by course and by task."
  search:
    location: navbar
    type: overlay
  navbar:
    background: primary
    search: true
    # Courses are top-navbar dropdowns (alphabetical); tasks within each are
    # ordered by workflow (fit → diagnose → select → special cases).
    left:
      - text: "Home"
        href: index.qmd
      - text: "Experiments"
        menu:
          - text: "Assign Random Treatments"
            href: tasks/experiments/assign-random-treatments.qmd
          - text: "Sample Size"
            href: tasks/experiments/sample-size.qmd
          - text: "Conservative Estimate of Variance"
            href: tasks/experiments/conservative-estimate-of-variance.qmd
          - text: "Test Treatment Effect"
